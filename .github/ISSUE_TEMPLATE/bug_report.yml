name: Bug Report
description: Create a report to help us improve and fix issues
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug! Please fill out the form below as completely as possible.
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: Describe what went wrong...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: To Reproduce
      description: Steps to reproduce the behavior. Please provide a clear step-by-step list.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, drag and drop or paste screenshots to help explain your problem.
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: Which operating system did you experience this bug on?
      options:
        - Windows
        - macOS
        - Linux
        - iOS
        - Android
        - Other
    validations:
      required: false
  - type: input
    id: browser
    attributes:
      label: Browser / App Environment
      description: E.g., Chrome, Firefox, Safari, or native client.
      placeholder: E.g. Chrome 120
  - type: input
    id: version
    attributes:
      label: Version or Branch
      description: E.g., main, v1.0.0, or specific commit hash.
      placeholder: E.g. main
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
  - type: checkboxes
    id: search-confirmation
    attributes:
      label: Search before opening
      description: Please confirm you checked for existing issues.
      options:
        - label: I have searched existing issues and verified this has not been reported.
          required: true
