name: Greetings

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - name: Welcome new contributors
      uses: actions/github-script@v9
      with:
        script: |
          const { owner, repo } = context.repo;
          const author = context.payload.sender.login;
          const isIssue = !!context.payload.issue;
          const association = isIssue ? context.payload.issue.author_association : context.payload.pull_request.author_association;

          // Welcome first-time contributors or new users (association is 'FIRST_TIME_CONTRIBUTOR' or 'NONE')
          if (association === 'FIRST_TIME_CONTRIBUTOR' || association === 'NONE') {
            const welcomeMessage = `Welcome to the Ground Zero Community, @${author}! 🎉\n\nThank you for opening this ${isIssue ? 'issue' : 'pull request'}. We appreciate your contribution!\n\nTo get started, please make sure you have read our **[Contributing Guidelines](https://github.com/GroundZeroCommunity/.github/blob/master/.github/CONTRIBUTING.md)** and **[Code of Conduct](https://github.com/GroundZeroCommunity/.github/blob/master/.github/CODE_OF_CONDUCT.md)**.\n\nJoin our community discussions and connect with other developers on our **[Discord Server](https://discord.gg/4H2v6UwjmY)**!\n\nA maintainer will review your ${isIssue ? 'issue' : 'pull request'} soon.`;

            if (isIssue) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: context.payload.issue.number,
                body: welcomeMessage
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: context.payload.pull_request.number,
                body: welcomeMessage
              });
            }
          }
