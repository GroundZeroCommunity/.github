name: Mark stale issues and pull requests

on:
  schedule:
  - cron: "0 0 * * *"

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - uses: actions/stale@v9
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        stale-issue-message: "This issue is stale because it has been open 60 days with no activity. Remove the stale label or comment, or this will be closed in 7 days."
        stale-pr-message: "This pull request is stale because it has been open 60 days with no activity. Remove the stale label or comment, or this will be closed in 7 days."
        close-issue-message: "This issue was closed because it has been stalled for 7 days with no activity."
        close-pr-message: "This pull request was closed because it has been stalled for 7 days with no activity."
        days-before-stale: 60
        days-before-close: 7
        stale-issue-label: "stale"
        stale-pr-label: "stale"
